<script>

const params = new URLSearchParams(window.location.search);

const policyNo = params.get('policy');
const dob = params.get('dob');

const display = document.getElementById('policy-display');
const status = document.getElementById('status');
const btn = document.getElementById('manual-btn');

if(policyNo && dob){
    display.innerText = policyNo + " & " + dob;
}

async function copyPolicy(){

    if(!policyNo || !dob){
        status.innerText = "Policy or DOB missing";
        return;
    }

    const textToCopy = policyNo + " & " + dob;

    try{
        await navigator.clipboard.writeText(textToCopy);
        status.innerText = "✅ Copied!";
        btn.style.display="block";

        setTimeout(()=>{
            window.location.href="https://lic.corover.ai/";
        },1500);

    }catch(err){
        status.innerText="Copy failed. Please copy manually.";
        btn.style.display="block";
    }
}

</script>
