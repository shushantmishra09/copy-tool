<script>

const params = new URLSearchParams(window.location.search);

const policy = params.get('policy');
const dob = params.get('dob');

const policyDisplay = document.getElementById("policy-display");
const dobDisplay = document.getElementById("dob-display");
const status = document.getElementById("status");
const openBtn = document.getElementById("open-btn");

if(policy) policyDisplay.innerText = policy;
if(dob) dobDisplay.innerText = dob;

async function copyData(){

if(!policy || !dob){
status.innerText = "Missing Policy or DOB";
return;
}

const textToCopy = `${policy}&${dob}`;

try{

await navigator.clipboard.writeText(textToCopy);

status.innerText = "✅ Copied!";
openBtn.style.display="block";

setTimeout(()=>{
window.location.href="https://lic.corover.ai/";
},1500);

}
catch(err){

status.innerText="Copy failed. Copy manually.";
openBtn.style.display="block";

}

}

</script>
